<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="student-portal-style.css">
</head>
<body>
    <div class="container">
        <h1>Student Portal</h1>
        
        <!-- Navigation Menu -->
        <nav>
            <ul>
                <li><a href="#available-courses">Available Courses</a></li>
                <li><a href="#course-progress">Course Progress</a></li>
                <li><a href="#attendance-report">Attendance Report</a></li>
                <li><a href="#personal-data">Personal Data</a></li>
                <li><a href="#" id="logout-btn">Logout</a></li>
            </ul>
        </nav>

        <!-- Available Courses Section -->
        <section id="available-courses">
            <h2>Available Courses</h2>
            <div id="course-list">
                <!-- Courses will be populated dynamically -->
            </div>
        </section>

        <!-- Course Progress Section -->
        <section id="course-progress">
            <h2>Course Progress</h2>
            <div id="progress-list">
                <!-- Progress will be populated dynamically -->
            </div>
        </section>

        <!-- Attendance Report Section -->
        <section id="attendance-report">
            <h2>Attendance Report</h2>
            <table id="attendance-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Attendance records will be populated dynamically -->
                </tbody>
            </table>
        </section>

        <!-- Personal Data Section -->
        <section id="personal-data">
            <h2>Personal Data</h2>
            <div id="student-details">
                <!-- Student details will be populated dynamically -->
            </div>
        </section>
    </div>

    <script src="student-portal-script.js"></script>
</body>
</html>
